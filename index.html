<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics Store Inventory Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="sidebar">
            <h2 class="logo">ElectroStock</h2>
            <ul>
                <li>Dashboard</li>
                <li>Products</li>
                <li>Suppliers</li>
                <li>Logout</li>
            </ul>
        </div>
        <div class="main">
            <div class="topbar">
                <h3>Dashboard</h3>
            </div>
            <div class="card-container">
                <div class="card">
                    <h2>150</h2>
                    <p>Total Products</p>
                </div>
                <div class="card">
                    <h2>12</h2>
                    <p>Suppliers</p>
                </div>
                <div class="card">
                    <h2>8</h2>
                    <p>Low Stock</p>
                </div>
                <div class="card">
                    <h2>$25000</h2>
                    <p>Inventory Value</p>
                </div>
            </div>
        </div>
    </div>

    <div class="table-container">
        <input type="text" placeholder="Search Product" style="margin-bottom:15px;">
        <table>
            <tr>
                <th>Product</th>
                <th>Price</th>
                <th>Stock</th>
                <th>Supplier</th>
                <th>Action</th>
            </tr>
            <tr>
                <td>Dell Laptop</td>
                <td>$800</td>
                <td>10</td>
                <td>Tech World</td>
                <td><button class="btn">View</button></td>
            </tr>
            <tr class="low-stock">
                <td>Logitech Mouse</td>
                <td>$10</td>
                <td>Gadget Hub</td>
                <td>Low Stock</td>
            </tr>
        </table>
    </div>
</body>
</html>
