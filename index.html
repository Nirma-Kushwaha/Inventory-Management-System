<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electronics Store Inventory Management System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header">
        <h1>Dashboard</h1>
        <p>Welcome Back, Admin</p>
    </div>
    <div class="cards">
        <div class="card">
            <h3>Total Products</h3>
            <h2>50</h2>
        </div>
        <div class="card">
            <h3>Suppliers</h3>
            <h2>10</h2>  
        </div>
         <div class="card">
            <h3>Low Stock</h3>
            <h2>4</h2>  
        </div>
    </div>
    <div class="recent-products">
        <h2>Recent Products</h2>
        <ul>
            <li>Dell Laptop</li>
            <li>HP Monitor</li>
            <li>USB Cable</li>
            <li>Mouse</li>
            <li>Keyboard</li>
        </ul>
    </div>
</body>
</html>
